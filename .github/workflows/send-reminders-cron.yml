name: Send registration reminders

# Vercel's Hobby plan only allows once-per-day native Cron schedules — too
# coarse for "1 hour before close" reminders — so this workflow triggers the
# existing route (src/app/api/matchday/send-reminders/route.ts) on GitHub's
# own free scheduler instead. Requires a repo secret CRON_SECRET matching the
# CRON_SECRET env var set in Vercel.
#
# Paused (2026-07-20): the schedule trigger below is intentionally removed —
# every run was failing (missing/mismatched CRON_SECRET repo secret), and
# GitHub was emailing a failure notification for each one. Manual-only via
# workflow_dispatch until that's sorted out and this is deliberately
# re-enabled by restoring a `schedule:` block here. The route itself
# (src/app/api/matchday/send-reminders/route.ts) and everything it calls is
# untouched — this only stops it from firing automatically.
on:
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://kaiser-stats.vercel.app/api/matchday/send-reminders
